<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Conne Super! – Lern-App</title>
  <meta name="description" content="Übungs-App für Mathematik im Lehramtsstudium">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./vendor/katex/katex.min.css">
  <link rel="manifest" href="./manifest.webmanifest">
  <!-- Statusleiste an den App-Hintergrund angleichen (nahtloser Übergang) -->
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <!-- iOS „Zum Home-Bildschirm“ -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Conne Super!">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
</head>
<body>
  <header class="appbar">
    <button class="back-btn hidden" id="backBtn" aria-label="Zurück">‹</button>
    <h1>Conne&nbsp;Super!</h1>
    <span class="spacer"></span>
    <span class="streak-pill" id="streakVal">🔥 0</span>
  </header>

  <main id="app"><!-- wird per JS gefüllt --></main>
  <div id="actionbar" class="actionbar hidden"></div>

  <!-- Reihenfolge wichtig: erst Konfig+Daten+Sync, dann App -->
  <script src="./config.js"></script>
  <script src="./data/questions.js"></script>
  <script src="./data/oral.js"></script>
  <script src="./vendor/katex/katex.min.js"></script>
  <script src="./js/sync.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
